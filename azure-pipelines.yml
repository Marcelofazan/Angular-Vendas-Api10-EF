trigger:
  - main

pool:
  vmImage: 'ubuntu-latest'

variables:
  buildConfiguration: 'Release'
  dotnetVersion: '10.0.x'

stages:
- stage: Build_Angular
  displayName: 'Build Angular Application'
  jobs:
  - job: BuildClient
    displayName: 'npm install and build'
    steps:
    - task: NodeTool@0
      inputs:
        versionSpec: '20.x'
      displayName: 'Install Node.js'

    - script: |
        # Busca automaticamente a pasta que contém o arquivo angular.json
        ANGULAR_PATH=$(find . -name "angular.json" -exec dirname {} \;)
        
        if [ -z "$ANGULAR_PATH" ]; then
          echo "ERRO: O arquivo angular.json não foi encontrado em nenhuma pasta do repositório!"
          echo "Arquivos na raiz para verificação:"
          ls -la
          exit 1
        fi
        
        echo "##vso[task.setvariable variable=detectedAngularDir]$ANGULAR_PATH"
        echo "Projeto Angular localizado em: $ANGULAR_PATH"
        
        cd "$ANGULAR_PATH"
        
        if [ -f package-lock.json ]; then
          npm ci
        else
          npm install
        fi
        
        npm run build -- --configuration production
      displayName: 'Angular 17 Build (Auto-Detect)'

    - publish: $(detectedAngularDir)/dist/browser
      artifact: 'angular-dist'
      displayName: 'Publish Angular Artifacts'

- stage: Build_DotNet
  displayName: 'Build and Publish .NET API'
  jobs:
  - job: BuildAPI
    displayName: 'dotnet build and publish'
    steps:
    - task: UseDotNet@2
      inputs:
        version: '$(dotnetVersion)'
        packageType: 'sdk'
      displayName: 'Install .NET SDK'

    - script: |
        # Busca automaticamente a pasta que contém o arquivo de solução (.sln) ou projeto (.csproj)
        NET_PATH=$(find . -name "*.sln" -o -name "*.csproj" -exec dirname {} \; | head -n 1)
        
        if [ -z "$NET_PATH" ]; then
          echo "ERRO: Nenhum arquivo .sln ou .csproj foi encontrado no repositório!"
          exit 1
        fi
        
        echo "Projeto .NET localizado em: $NET_PATH"
        cd "$NET_PATH"
        
        dotnet restore
        dotnet build --configuration $(buildConfiguration)
        dotnet publish --configuration $(buildConfiguration) --output $(Build.ArtifactStagingDirectory)/ApiPublish
      displayName: '.NET 10 Build and Publish (Auto-Detect)'

    - publish: $(Build.ArtifactStagingDirectory)/ApiPublish
      artifact: 'dotnet-api'
      displayName: 'Publish .NET Artifacts'
